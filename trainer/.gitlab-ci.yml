workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TITLE =~ /^(\[Draft\]|\(Draft\)|Draft:)/
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' &&
          $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - test
  - build

.unit_python_job: &unit_python_job
  tags:
    - ci.inria.fr
    - medium
  image: python:3.13-slim
  before_script:
    - python -m venv .venv
    - . .venv/bin/activate
    - pip install --upgrade pip

unit-tests:
  stage: test
  <<: *unit_python_job
  script:
    - pip install ".[cpu,dev]"
    - pytest

import-test:
  stage: test
  <<: *unit_python_job
  script:
    - pip install ".[cpu]"
    - python -c "import torch, hatorch; print('Imports OK')"

build-wheel:
  stage: build
  <<: *unit_python_job
  script:
    - pip install build
    - python -m build
